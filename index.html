<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pulse — Chat em tempo real para seu grupo">
    <title>Pulse | Chat em Tempo Real</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Animated Background Orbs -->
    <div class="bg-animation" aria-hidden="true">
        <div class="bg-orb bg-orb--1"></div>
        <div class="bg-orb bg-orb--2"></div>
        <div class="bg-orb bg-orb--3"></div>
    </div>

    <!-- ==================== LOGIN SCREEN ==================== -->
    <div id="login-screen" class="screen screen--active">
        <div class="login-card glass">
            <div class="login-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                        </svg>
                    </div>
                    <h1 class="logo-text">Pulse</h1>
                </div>
                <p class="login-subtitle">Chat em tempo real para seu grupo</p>
            </div>

            <form id="login-form" class="login-form">
                <div class="input-group">
                    <input
                        type="text"
                        id="nickname-input"
                        class="input"
                        placeholder="Escolha um nickname..."
                        minlength="3"
                        maxlength="20"
                        required
                        autocomplete="off"
                        spellcheck="false"
                    >
                    <span class="input-hint">3-20 caracteres</span>
                </div>
                <button type="submit" class="btn btn--primary btn--full" id="login-btn">
                    <span>Entrar no Chat</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <!-- ==================== CHAT SCREEN ==================== -->
    <div id="chat-screen" class="screen">
        <div class="chat-layout">

            <!-- Header -->
            <header class="chat-header glass" id="chat-header">
                <div class="header-left">
                    <button class="btn btn--icon sidebar-toggle" id="sidebar-toggle" aria-label="Mostrar usuários online">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                    </button>
                    <div class="logo logo--sm">
                        <div class="logo-icon logo-icon--sm">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                            </svg>
                        </div>
                        <span class="logo-text logo-text--sm">Pulse</span>
                    </div>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span class="status-dot" title="Online"></span>
                        <span class="user-nickname" id="user-nickname"></span>
                    </div>
                    <button class="btn btn--ghost" id="logout-btn">Sair</button>
                </div>
            </header>

            <!-- Sidebar (Online Users) -->
            <aside class="sidebar glass" id="sidebar">
                <div class="sidebar-header">
                    <h3>Online</h3>
                    <span class="badge" id="online-count">0</span>
                </div>
                <ul class="user-list" id="online-users"></ul>
            </aside>
            <div class="sidebar-overlay" id="sidebar-overlay"></div>

            <!-- Messages Area -->
            <main class="chat-main">
                <div class="messages-container" id="messages-container">
                    <div class="messages-welcome" id="messages-welcome">
                        <div class="welcome-icon">⚡</div>
                        <h2>Bem-vindo ao Pulse!</h2>
                        <p>As mensagens aparecerão aqui em tempo real.</p>
                    </div>
                </div>

                <!-- Message Input -->
                <div class="input-bar glass">
                    <form id="message-form" class="message-form">
                        <input
                            type="text"
                            id="message-input"
                            class="input input--message"
                            placeholder="Digite sua mensagem..."
                            maxlength="500"
                            autocomplete="off"
                            spellcheck="true"
                        >
                        <button type="submit" class="btn btn--send" id="send-btn" disabled aria-label="Enviar mensagem">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <!-- Connection Status Toast -->
    <div class="toast" id="connection-toast">
        <span class="toast-icon">🔄</span>
        <span class="toast-text" id="toast-text">Conectando...</span>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
